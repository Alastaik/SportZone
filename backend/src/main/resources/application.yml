# Configuração do SportZone Backend
spring:
  application:
    name: sportzone-backend

  # Conexão com PostgreSQL (container do docker-compose)
  datasource:
    url: jdbc:postgresql://localhost:5432/sportzone
    username: admin
    password: adminpassword
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update  # Cria/atualiza tabelas automaticamente (apenas dev)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Kafka — Configuração do broker e serialização
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: sportzone-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.sportzone.event

server:
  port: 8080
